services:

  frontend:
    build:
      context: ./frontend

    container_name: task-manager-frontend

    ports:
      - "3000:80"

    depends_on:
      - backend

    restart: unless-stopped


  backend:
    build:
      context: ./backend

    container_name: task-manager-backend

    ports:
      - "8000:8000"

    env_file:
      - ./backend/.env.backend

    depends_on:
      mysql:
        condition: service_healthy


    restart: unless-stopped


  mysql:
    image: mysql:8

    container_name: task-manager-mysql

    ports:
      - "3306:3306"

    env_file:
      - .env.db

    volumes:
      - mysql_data:/var/lib/mysql

    restart: unless-stopped


volumes:
  mysql_data:

